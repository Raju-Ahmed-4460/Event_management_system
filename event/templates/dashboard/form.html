{% extends "dashboard/base.html" %}


{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-100">
    
    <div class="w-full max-w-lg bg-white p-6 rounded-lg shadow-lg border">


        <div>
            {% if messages %}

            {% for message  in messages %}
            <div class="px-2 py-1 {% if message.tags == 'success' %}bg-green-500{% endif %}">{{message}}</div>
            
            {% endfor %}
            
            {% endif %}
        </div>

        <h2 class="text-2xl font-bold mb-4 text-center">
            Create Form
        </h2>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <button class="bg-blue-500 text-white px-4 py-2 mt-4">
                Submit
            </button>
        </form>

    </div>

</div>

{% endblock content %}
